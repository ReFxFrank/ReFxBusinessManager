<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offline · ReFx</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f6f7f2; color: #1a2b20; text-align: center; padding: 2rem;
      }
      .card { max-width: 22rem; }
      .badge {
        width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 1rem;
        background: linear-gradient(135deg, #2f7d4e, #256340);
        display: grid; place-items: center; color: #fff; font-size: 28px;
      }
      h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
      p { color: #5b6b60; margin: 0 0 1.5rem; }
      button {
        background: #2f7d4e; color: #fff; border: 0; border-radius: 12px;
        padding: .75rem 1.5rem; font-size: 1rem; font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">📈</div>
      <h1>You're offline</h1>
      <p>ReFx needs a connection to load your latest business data. Check your network and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
